<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario-W POS Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
    </style>
</head>
<body class="bg-gradient text-white h-screen flex flex-col items-center justify-center overflow-hidden" x-data="loader()">

    <!-- Splash Screen -->
    <div id="splash" class="flex flex-col items-center animate-pulse">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-indigo-500/20 mb-6">
            <span class="text-4xl font-black italic tracking-tighter">W</span>
        </div>
        <h1 class="text-xl font-black uppercase tracking-widest mb-2">Terminal POS</h1>
        <p class="text-slate-400 text-xs font-bold" id="status-text">Iniciando sistema...</p>
        
        <div class="mt-8 w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-indigo-500 transition-all duration-500" id="progress-bar" style="width: 10%"></div>
        </div>
    </div>

    <!-- Error / Config Screen (Hidden by default) -->
    <div id="config-screen" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[40px] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-2 text-rose-500">Error de Conexión</h2>
            <p class="text-slate-400 text-sm mb-6">No se pudo establecer conexión con el servidor local. Asegúrate de que XAMPP esté encendido.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">URL del Servidor</label>
                    <input type="text" id="server-url" value="http://localhost/Inventario-w/public/admin/page/pos" 
                           class="w-full bg-slate-800 border border-slate-700 p-3 rounded-2xl text-sm font-bold focus:border-indigo-500 outline-none transition-all">
                </div>
                <button onclick="tryConnect()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black text-sm transition-all shadow-xl">REINTENTAR CONEXIÓN</button>
            </div>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const splash = document.getElementById('splash');
        const configScreen = document.getElementById('config-screen');
        const serverInput = document.getElementById('server-url');

        // Load saved URL
        const savedUrl = localStorage.getItem('pos_server_url');
        if (savedUrl) serverInput.value = savedUrl;

        async function tryConnect() {
            const url = serverInput.value;
            statusText.innerText = "Conectando con " + url + "...";
            progressBar.style.width = "40%";
            configScreen.classList.add('hidden');
            splash.classList.remove('hidden');

            try {
                // Pre-check if server is alive
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                // We use a small fetch to check connectivity
                await fetch(url, { mode: 'no-cors', signal: controller.signal });
                
                progressBar.style.width = "100%";
                statusText.innerText = "Conexión exitosa. Cargando interfaz...";
                
                localStorage.setItem('pos_server_url', url);

                // Redirect
                setTimeout(() => {
                    window.location.href = url;
                }, 800);

            } catch (err) {
                console.error(err);
                splash.classList.add('hidden');
                configScreen.classList.remove('hidden');
            }
        }

        // Start connection
        setTimeout(tryConnect, 1000);
    </script>
</body>
</html>
