<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS-Windows | Inventario-W</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen overflow-hidden" x-data="posApp()" x-init="init()">
    
    <!-- Navbar / Header -->
    <header class="bg-slate-900 text-white h-16 flex items-center px-6 shadow-xl shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-500 rounded-xl shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <div>
                <p class="font-black text-sm uppercase italic leading-none">Inventario-W</p>
                <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest mt-1">Native Terminal v1.0</p>
            </div>
        </div>
        
        <div class="flex-1 px-8">
            <div class="max-w-md relative group">
                <input type="text" x-model="searchQuery" @input.debounce="search()" placeholder="Buscar productos..." 
                       class="w-full bg-slate-800 border-none rounded-xl px-10 py-2 text-sm focus:ring-2 focus:ring-indigo-500 transition-all">
                <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex flex-col items-end">
                <span :class="isOnline ? 'bg-emerald-500' : 'bg-rose-500'" class="w-2 h-2 rounded-full mb-1"></span>
                <span class="text-[10px] font-black uppercase tracking-tighter" x-text="isOnline ? 'Online' : 'Offline Mode'"></span>
            </div>
            <button @click="forceSync()" class="p-2 hover:bg-slate-800 rounded-xl transition-colors">
                <svg class="w-5 h-5" :class="isSyncing ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 00-15.357-2m15.357 2H15"/></svg>
            </button>
            <button @click="showSettings = true" class="p-2 hover:bg-slate-800 rounded-xl transition-colors text-slate-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden h-[calc(100vh-4rem)]">
        
        <!-- Left Column: Products -->
        <div class="w-2/3 flex flex-col bg-white border-r border-slate-200">
            <div class="flex-1 overflow-y-auto p-4">
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    <template x-for="p in filteredProducts" :key="p.id">
                        <button @click="addToCart(p)" class="group bg-white border border-slate-200 rounded-2xl p-3 text-left hover:border-indigo-400 hover:shadow-xl transition-all active:scale-95">
                            <div class="aspect-square bg-slate-100 rounded-xl mb-2 flex items-center justify-center font-black text-indigo-300 text-2xl" 
                                 x-text="p.nombre.substring(0,2).toUpperCase()"></div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase truncate" x-text="p.sku"></p>
                            <p class="text-xs font-bold text-slate-800 line-clamp-2" x-text="p.nombre"></p>
                            <p class="text-sm font-black text-indigo-600 mt-2 font-mono" x-text="'$' + parseFloat(p.precio_venta).toFixed(2)"></p>
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- Right Column: Cart -->
        <div class="w-1/3 flex flex-col bg-slate-50">
            <div class="px-6 py-4 border-b border-slate-200 bg-white flex justify-between items-center">
                <span class="text-xs font-black uppercase text-slate-500">Mesa de Trabajo</span>
                <button @click="cart = []" class="text-[10px] font-bold text-rose-500">Vaciar</button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-4 py-4 space-y-2">
                <template x-for="(item, idx) in cart" :key="item.id">
                    <div class="bg-white rounded-xl border border-slate-200 p-3 flex items-center gap-3">
                        <div class="flex-1">
                            <p class="text-xs font-bold text-slate-800" x-text="item.nombre"></p>
                            <p class="text-[10px] text-slate-400 font-mono" x-text="'$' + item.precio_venta + ' x ' + item.qty"></p>
                        </div>
                        <div class="flex items-center gap-1">
                            <button @click="updateQty(idx, -1)" class="w-6 h-6 bg-slate-100 rounded flex items-center justify-center">-</button>
                            <span class="w-5 text-center text-xs font-bold" x-text="item.qty"></span>
                            <button @click="updateQty(idx, 1)" class="w-6 h-6 bg-slate-100 rounded flex items-center justify-center">+</button>
                        </div>
                        <div class="text-right min-w-[60px]">
                            <p class="text-xs font-black text-slate-900 font-mono" x-text="'$' + (item.precio_venta * item.qty).toFixed(2)"></p>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Footer: Totals and Pay -->
            <div class="bg-white border-t border-slate-200 p-6 shadow-2xl shadow-slate-900/40">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-xs font-black text-slate-400 uppercase">Total Cobro</span>
                    <span class="text-4xl font-black text-indigo-600 font-mono tracking-tighter" x-text="'$' + total().toFixed(2)"></span>
                </div>
                
                <button @click="processPayment()" :disabled="cart.length === 0" 
                        class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-indigo-600 disabled:bg-slate-200 disabled:text-slate-400 transition-all active:scale-95 shadow-xl shadow-indigo-600/20">
                    COBRAR (F5)
                </button>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <div x-show="showSuccess" x-cloak class="fixed inset-0 bg-slate-900/90 flex items-center justify-center z-[100] backdrop-blur-xl">
        <div class="bg-white rounded-[40px] p-10 text-center space-y-6 max-w-sm w-full mx-4">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center mx-auto text-white shadow-2xl shadow-emerald-500/40 rotate-12">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-900">¡Venta Exitosa!</h2>
            <p class="text-sm text-slate-400">La venta se ha guardado localmente y se sincronizará automáticamente.</p>
            <button @click="showSuccess = false" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl">Nueva Venta</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div x-show="showSettings" x-cloak class="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[110] backdrop-blur-md">
        <div class="bg-white rounded-[32px] p-8 max-w-md w-full mx-4 shadow-2xl space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-black text-slate-900 uppercase italic">Configuración Técnica</h3>
                <button @click="showSettings = false" class="text-slate-400 hover:text-slate-900">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">URL API del Servidor</label>
                    <input type="text" x-model="config.API_BASE" placeholder="https://tu-servidor.com/api/v1" 
                           class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-xs focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Token de Sincronización (X-Sync-Token)</label>
                    <input type="password" x-model="config.SYNC_TOKEN" placeholder="Pegar token aquí..." 
                           class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-xs focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">ID de Sucursal (Locale)</label>
                        <input type="number" x-model="config.LOCAL_ID"
                               class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-xs focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">ID de Caja</label>
                        <input type="number" x-model="config.CAJA_ID"
                               class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-xs focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>

            <div class="pt-4 flex gap-3">
                <button @click="saveSettings()" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition-all active:scale-95">
                    GUARDAR CAMBIOS
                </button>
            </div>
            <p class="text-[9px] text-slate-400 text-center uppercase font-bold tracking-widest">Los cambios requieren reiniciar la sincronización</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
