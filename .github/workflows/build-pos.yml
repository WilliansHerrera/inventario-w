name: Build POS Windows

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'POS-Windows/**'
      - '.github/workflows/build-pos.yml'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './POS-Windows/src-tauri -> target'

      - name: Install dependencies
        working-directory: ./POS-Windows
        run: npm install

      - name: Build Windows Terminal
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./POS-Windows
          tagName: v__VERSION__ # Final EXE will be available in Releases
          releaseName: "POS Terminal v__VERSION__"
          releaseBody: "Venta e Inventario POS Nativo para Windows (Auto-generado por GitHub)"
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
